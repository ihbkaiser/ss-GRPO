inherits: ../_shared/hrdcr_train.yaml

method: flashgrpo_b200_hrdcr_qwen25_7b
run_name: qwen25_7b_hrdcr
aux_head_checkpoint: outputs/pretrain/qwen25_7b

model:
  model_dir: /workspace/storage-shared/models/Qwen2.5-7B-Instruct
  model_type: qwen2
  dtype: bf16
  attn_implementation: sdpa

training:
  batch_size: 8
  accumulation_steps: 4
  saved_model_dir: outputs/train/qwen25_7b/{run_name}/target_lora
  saved_medusa_dir: outputs/train/qwen25_7b/{run_name}/medusa_heads

flashgrpo:
  medusa_heads_checkpoint: outputs/pretrain/qwen25_7b

logging:
  log_dir: logs/flashgrpo_b200/qwen25_7b/train/{run_name}

