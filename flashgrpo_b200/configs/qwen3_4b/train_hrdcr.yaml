inherits: ../_shared/hrdcr_train.yaml

method: flashgrpo_b200_hrdcr_qwen3_4b
run_name: qwen3_4b_hrdcr
aux_head_checkpoint: outputs/pretrain/qwen3_4b

model:
  model_dir: /workspace/storage-shared/models/Qwen3-4B
  model_type: qwen3
  dtype: bf16
  attn_implementation: sdpa

training:
  batch_size: 8
  accumulation_steps: 4
  saved_model_dir: outputs/train/qwen3_4b/{run_name}/target_lora
  saved_medusa_dir: outputs/train/qwen3_4b/{run_name}/medusa_heads

flashgrpo:
  medusa_heads_checkpoint: outputs/pretrain/qwen3_4b

logging:
  log_dir: logs/flashgrpo_b200/qwen3_4b/train/{run_name}

