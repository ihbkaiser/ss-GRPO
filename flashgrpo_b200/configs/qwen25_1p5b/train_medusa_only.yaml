inherits: train_hrdcr.yaml

method: medusa_only
run_name: qwen25_1p5b_medusa_only

# Static pretrained MEDUSA baseline. Generation and verifier budgets are
# inherited unchanged; only HRDCR and its auxiliary learner are absent.
reflex:
  enabled: true
  feedback_enabled: true
  proposal_injection_enabled: false
  feedback_stride: 2

aux_update:
  enabled: false
  mode: none

flashgrpo:
  online_medusa: false
  medusa_update_mode: none
