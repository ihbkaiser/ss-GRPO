inherits: ../fair_fastgrpo_b200/_base_qwen25_7b.yaml

method: flashgrpo_b200_hrdcr
run_name: flashgrpo_b200_hrdcr
seed: 42

data:
  train_option: gsm8k

generation:
  do_sample: true
  temperature: 1.0
  top_p: 0.95
  top_k:
  max_prompt_length: 2048
  max_length: 2048
  repeated_generate_nums: 8

training:
  batch_size: 8
  accumulation_steps: 4
  num_epochs: 1
  start_epoch: 0
  start_batch: 0
  start_used_items: 0
  start_rollout_count: 0
  sample_num: 100
  train_data_fraction: 0.4
  train_subset_seed: 42
  max_train_samples: 0
  grpo_iteration_num: 1
  target_lr: 1.0e-6
  beta: 0.04
  epsilon: 0.1
  max_training_padding_gap: 4096
  max_training_token: 4096
  logps_chunk_size: 512
  load_lora_path: ""
  save_steps: 10
  save_on_exception: true
  num_workers: 8
  persistent_workers: true

flashgrpo:
  require_pretrained_heads: true
  allow_random_init: false
  proposal_mode: medusa
  chain_enable_after: 1000000000
  chain_loss_weight: 0.0
  chain_loss_max_depth: 0
  acceptance: exact_target
  tree_mode: concurrency_aware
  tree_layout: sparse_asymmetric
  adaptive_tree_enabled: false
  online_medusa: true
  medusa_update_mode: sparse_online
  medusa_lr: 5.0e-5
  cpeak_nodes: 512
  auto_tune_cpeak_enabled: false
  auto_tune_cpeak_candidates: [128, 192, 256, 384, 512, 768]
  auto_tune_cpeak_trials_per_candidate: 3
  auto_tune_cpeak_start_rollout: 0
  max_tree_nodes_per_seq: 10
  inference_head_mirror: true
  inference_head_dtype: bf16
  head_inference_autocast: false
  project_internal_tree_logits_only: true
  inplace_kv_compaction: true
  empty_cache_after_target_train: false
  empty_cache_threshold_mb: 140000
  empty_cache_reserved_ratio: 1.6
  gpu_poll_interval_s: 20.0

tree:
  mode: sparse_asymmetric
  max_nodes_per_seq: 10
  nodes_by_head: [5, 4, 0]
  min_head3_nodes: 0
  head3_min_budget: 8
  head3_exploration_fraction: 0.03
  head3_warmup_exploration_fraction: 0.10
  head3_warmup_records: 1024
  head3_min_calibration_records: 1024
  branch_score_temperature: 1.0
  diversity_penalty: 0.05
  head3_quality_bins: 10
  head3_node_cost: 0.35
  head3_quality_ema_beta: 0.95
  head3_quality_weights:
    top1: 0.30
    margin: 0.20
    entropy: 0.15
    path: 0.10
    acceptance: 0.20
    regret: 0.15

reflex:
  enabled: true
  adaptation_mode: immediate
  state_space: hidden
  strict_horizon_pipeline: true
  horizon_resolved: true
  feedback_enabled: true
  proposal_injection_enabled: true
  proposal_injection_scale: 1.0
  proposal_injection_after: 0
  proposal_injection_warmup: 0

  # Per-head m_{t,k}; shared consensus and context memory are intentionally off.
  consensus_strength: 0.0
  context_rank: 0
  context_mix: 0.0
  half_life_tokens: 32
  state_rms_clip: 1.0
  numerical_reset_rms: 1.25

  # Predictive trust from the exact proposal-time state sketch.
  hint_quality_beta: 0.90
  trust_n0: 4.0
  sketch_rank: 24
  sketch_seed: 29

  # Relative-RMS proposal trust region. No state renormalization or magnitude gate.
  injection_gate_mode: normalized
  relative_rms_delta_base: 0.02
  correction_ratio_min: 0.005
  correction_ratio_max: 0.020
  min_effective_updates: 4
  min_alignment_count: 4
  min_state_rms: 0.005
  state_reference_rms: 0.03
  alignment_floor: 0.0
  alignment_full: 0.10
  alignment_lcb_z: 1.0
  dynamic_tree_enabled: true
  sparse_boundary_check_enabled: true
  sparse_boundary_margin: 0.20
  horizon_delta_rule: constant
  warmup_effective_updates: 0.0
  magnitude_gate_floor: 0.0
  guard_enabled: false

  # S = TopL(q) union TopM(p) union {actual target token}.
  proposal_topk: 16
  target_topk: 16
  feedback_union_cap: 48
  feedback_temperature: 1.0
  feedback_stride: 4
  feedback_stride_min: 1
  feedback_objective: distribution
  distribution_weight: 0.25
  coverage_feedback_weight: 1.0
  boundary_width: 2
  severity_tv_weight: 0.5
  severity_out_weight: 0.5
  severity_min: 0.02

  anchor_conditioning_enabled: false
  utility_scheduler_enabled: false
  motivation_trace_enabled: false

  head1:
    enabled_at_start: true
    min_effective_updates: 2
    min_alignment_count: 8
    correction_ratio_min: 0.010
    correction_ratio_max: 0.030
    state_ema_decay: 0.85

  head2:
    enabled_at_start: false
    collect_feedback_when_disabled: true
    min_effective_updates: 4
    min_alignment_count: 32
    correction_ratio_min: 0.005
    correction_ratio_max: 0.015
    state_ema_decay: 0.90

  head3:
    enabled_at_start: false
    collect_feedback_when_disabled: true
    min_effective_updates: 4
    min_alignment_count: 64
    correction_ratio_min: 0.005
    correction_ratio_max: 0.010
    state_ema_decay: 0.95

reflex_safety:
  min_probe_count: 512
  candidate_mass_deadband: 0.0001
  net_win_rate_deadband: 0.0005
  bad_windows_before_decay: 2
  good_windows_before_recovery: 3
  decay_factor: 0.50
  recovery_factor: 1.25
  minimum_active_ratio: 0.125
  disabled_head_recovery_probe_interval: 512

persistent_memory:
  enabled: false

aux_update:
  enabled: true
  mode: sparse_online
  records_per_update: 256
  min_records_per_update: 128
  min_records_per_selected_head: 64
  max_heads_per_update: 1
  learning_rate: 5.0e-5
  max_grad_norm: 1.0
  min_rollouts_between_updates: 8
  max_overhead_fraction: 0.015
  head_sampling_weights: [1.0, 1.0, 1.0]
  optimizer_steps: 1
  max_cached_records: 4096
  reflex_cache_enabled: true
  cache_stride: 1

  sparse_support_cap: 48
  target_topk: 16
  proposal_topk: 16
  min_expected_benefit: 0.001
  reflex_record_microbatch_size: 128

  overhead_scheduler:
    warmup_updates: 3
    consecutive_bad_updates_before_throttle: 2
    consecutive_good_updates_before_recovery: 4
    throttle_factor: 0.75
    recovery_factor: 1.20
    minimum_record_budget: 128

  update_backbone: false
  update_lm_head: false
  update_fast_state_injections: false
  update_feedback_projection: false
  update_updater: false

aux_loss:
  raw_kl_weight: 1.0
  effective_kl_weight: 0.25
  coverage_weight: 1.0
  proximal_weight: 0.01
  ranking_margin: 0.20
  temperature: 1.0

checkpoint:
  save_aux_every_grpo_iters: 100
  save_aux_on_triggered_update: false
  keep_last_aux_checkpoints: 3

logging:
  append: false
  statistical_time: false

metrics:
  counterfactual_probe_interval: 256
  counterfactual_max_sequences: 8
  timing_sample_interval: 32
